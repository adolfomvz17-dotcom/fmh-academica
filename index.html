<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FMH — Gestión Académica</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
:root{--pink:#E91E8C;--pink3:#FCE4EC;--blue:#1A237E;--green:#2E7D32;--red:#C62828;--yellow:#F9A825;--border:#e0e0e0}
body{background:#f5f5f5;color:#333}
.hidden{display:none!important}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FCE4EC,#E91E8C22)}
.login-box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 8px 32px #E91E8C22;text-align:center}
.login-logo{font-size:52px;margin-bottom:8px}
.login-title{color:var(--pink);font-size:22px;font-weight:700;margin-bottom:2px}
.login-sub{color:#888;font-size:11px;margin-bottom:24px;line-height:1.5}
.login-box input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;margin-bottom:10px;outline:none}
.login-box input:focus{border-color:var(--pink)}
.btn-login{width:100%;padding:12px;background:var(--pink);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
#app{display:flex;min-height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,#E91E8C,#c2185b);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:42px;height:42px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.sidebar-logo-text{font-size:12px;font-weight:700;line-height:1.4}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 20px 4px;font-size:10px;opacity:0.6;text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:13px;font-weight:500;transition:background 0.15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.15)}
.nav-item.active{background:rgba(255,255,255,0.25);border-left-color:#fff}
.nav-item .ico{font-size:17px;width:22px;text-align:center}
.sidebar-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.2);font-size:12px}
.sidebar-user .uname{font-weight:600;margin-bottom:2px}
.sidebar-user .urole{opacity:0.75;font-size:11px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:700;color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:12px;font-size:12px;color:#666}
.btn-salir{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#666}
.content{flex:1;overflow-y:auto;padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid var(--border)}
.stat-card .num{font-size:28px;font-weight:700;color:var(--pink)}
.stat-card .lbl{font-size:10px;color:#888;margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card.blue .num{color:var(--blue)}
.stat-card.green .num{color:var(--green)}
.stat-card.red .num{color:var(--red)}
.stat-card.yellow .num{color:var(--yellow)}
.card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.card-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--pink3)}
.card-title{font-size:13px;font-weight:700;color:var(--blue)}
.card-body{padding:16px}
table{width:100%;border-collapse:collapse}
th{background:#f8f8f8;padding:9px 12px;text-align:left;font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
td{padding:9px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pink{background:var(--pink3);color:var(--pink)}
.badge-green{background:#E8F5E9;color:var(--green)}
.badge-red{background:#FFEBEE;color:var(--red)}
.badge-yellow{background:#FFFDE7;color:var(--yellow)}
.badge-blue{background:#E3F2FD;color:var(--blue)}
.badge-gray{background:#f5f5f5;color:#666}
.badge-purple{background:#EDE7F6;color:#4527A0}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-pink{background:var(--pink);color:#fff}
.btn-outline{background:none;border:1.5px solid var(--pink);color:var(--pink)}
.btn-red{background:#FFEBEE;color:var(--red);border:none}
.btn-blue{background:#E3F2FD;color:var(--blue);border:none}
.btn-green{background:#E8F5E9;color:var(--green);border:none}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:#555}
.form-group input,.form-group select,.form-group textarea{padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pink)}
.form-full{grid-column:1/-1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:700;color:var(--blue)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa}
.horario-grid{display:grid;grid-template-columns:100px repeat(5,1fr);gap:2px;font-size:11px}
.horario-header{background:var(--pink);color:#fff;padding:6px;text-align:center;font-weight:600;border-radius:4px}
.horario-hora{background:#f5f5f5;padding:6px;text-align:center;font-weight:600;color:#555;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px}
.horario-celda{background:#fff;border:1px solid #eee;padding:5px;border-radius:4px;min-height:44px;font-size:10px;line-height:1.3}
.horario-celda.descanso{background:#FFF9C4}
.horario-celda.lunch{background:#E8F5E9}
.horario-celda.actual{background:#FCE4EC;border:2px solid var(--pink);font-weight:600}
.horario-celda.vacio{background:#fafafa;color:#ccc}
.clase-actual-banner{background:linear-gradient(135deg,var(--pink),#c2185b);color:#fff;border-radius:16px;padding:20px;margin-bottom:20px}
.clase-actual-label{font-size:11px;opacity:0.8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.clase-actual-nombre{font-size:18px;font-weight:700;margin-bottom:4px}
.clase-actual-info{font-size:13px;opacity:0.9}
.clase-actual-btn{background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.5);color:#fff;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;font-family:inherit}
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.alert-red{background:#FFEBEE;color:var(--red);border-left:4px solid var(--red)}
.alert-yellow{background:#FFFDE7;color:#795548;border-left:4px solid var(--yellow)}
.alert-green{background:#E8F5E9;color:var(--green);border-left:4px solid var(--green)}
.alert-blue{background:#E3F2FD;color:var(--blue);border-left:4px solid var(--blue)}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#888}
.tab-btn.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{display:inline-flex;align-items:center;background:#f5f5f5;border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;user-select:none}
.chip.selected{background:var(--pink3);border-color:var(--pink);color:var(--pink);font-weight:600}
.flexible-banner{background:#E3F2FD;border:1px solid #90CAF9;border-radius:10px;padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:12px}
@media(max-width:768px){.sidebar{width:56px}.sidebar-logo-text,.nav-item span,.nav-section,.sidebar-user .uname,.sidebar-user .urole{display:none}.form-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}}

</head>

</div>

window._appReady = null;

let currentUser=null, currentPage='dashboard';

const isAdmin=()=>currentUser?.rol==='presidente';
const isCoord=()=>currentUser?.rol==='coordinadora';
const isDocente=()=>currentUser?.rol==='docente';
const isAdminOrCoord=()=>['presidente','coordinadora'].includes(currentUser?.rol);
const esCatedratico=()=>currentUser?.tipo==='catedratico';

function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  const found=DATA.usuarios.find(x=>x.usuario===u&&x.pass===p&&x.activo);
  if(!found){document.getElementById('loginErr').style.display='block';return;}
  document.getElementById('loginErr').style.display='none';
  currentUser=found;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sidebarName').textContent=found.nombre;
  document.getElementById('sidebarRole').textContent={presidente:'Presidente',coordinadora:'Coordinadora',docente:found.tipo==='catedratico'?'Catedrático':'Docente'}[found.rol];
  buildNav(); navigate('dashboard'); startClock();
}

function doLogout(){
  currentUser=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  clearInterval(window._clk);
}

function startClock(){
  const tick=()=>{
    const n=new Date();
    document.getElementById('topbarDate').textContent=n.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
    document.getElementById('topbarTime').textContent=n.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  };
  tick(); window._clk=setInterval(tick,30000);
}

function buildNav(){
  const nav=document.getElementById('sideNav');
  let items=[];
  if(isAdmin()||isCoord()){
    items=[
      {section:'Principal'},{id:'dashboard',ico:'📊',label:'Dashboard'},{id:'alertas',ico:'🔔',label:'Alertas'},
      {section:'Académico'},{id:'registros',ico:'📋',label:'Registros'},{id:'horarios',ico:'🕐',label:'Horarios'},
    ];
    if(isAdmin()) items.push(
      {section:'Administración'},{id:'usuarios',ico:'👥',label:'Usuarios'},
      {id:'grados',ico:'🏫',label:'Grados y Periodos'},{id:'reportes',ico:'📄',label:'Reportes'}
    );
    else items.push({id:'reportes',ico:'📄',label:'Reportes'});
  } else {
    items=[
      {id:'dashboard',ico:'📊',label:'Mi Dashboard'},
      {id:'registrar',ico:'✏️',label:'Registrar Clase'},
      {id:'mis_registros',ico:'📋',label:'Mis Registros'},
      {id:'horarios',ico:'🕐',label:'Mi Horario'},

function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav_'+page); if(el)el.classList.add('active');
  const titles={dashboard:'Dashboard',alertas:'Alertas',registros:'Registros de Actividades',horarios:'Horarios',usuarios:'Gestión de Usuarios',grados:'Grados y Periodos',reportes:'Reportes',registrar:'Registrar Clase',mis_registros:'Mis Registros'};
  document.getElementById('pageTitle').textContent=titles[page]||page;
  const c=document.getElementById('mainContent');
  if(page==='dashboard') renderDashboard(c);
  else if(page==='horarios') renderHorarios(c);
  else if(page==='usuarios') renderUsuarios(c);
  else if(page==='registrar') renderRegistrar(c);
  else if(page==='mis_registros') renderMisRegistros(c);
  else if(page==='registros') renderRegistrosAdmin(c);
  else if(page==='alertas') renderAlertas(c);
  else if(page==='grados') renderGrados(c);
  else if(page==='reportes') renderReportes(c);
}

const todayStr=()=>new Date().toISOString().slice(0,10);
const todayDia=()=>DIAS[new Date().getDay()];

function getClaseActual(grado, catKey){
  const dia=todayDia();
  if(!['lunes','martes','miercoles','jueves','viernes'].includes(dia)) return null;
  const now=new Date(); const hm=now.getHours()*60+now.getMinutes();
  if(catKey){
    const cat=HORARIOS_CAT[catKey]; if(!cat) return null;
    const clasesDia=cat.clases[dia]||[];
    for(const h of clasesDia){
      const [ih,im]=h.ini.split(':').map(Number);
      const [fh,fm]=h.fin.split(':').map(Number);
      if(hm>=ih*60+im&&hm<fh*60+fm) return {...h,nombre:`${h.area||cat.nombre} — ${h.grado}`,flexible:true};
    }
    return null;
  }
  const horario=HORARIOS[grado]; if(!horario) return null;
  for(const h of horario){
    const [ih,im]=h.ini.split(':').map(Number);
    const [fh,fm]=h.fin.split(':').map(Number);
    if(hm>=ih*60+im&&hm<fh*60+fm) return {...h,nombre:h.clases[dia]||'Sin clase'};
  }
  return null;
}

function guardarRegistro(){
  const gradoEl=document.getElementById('rGrado');

  const estandar=document.getElementById('rEstandar').value.trim();
  const competencia=document.getElementById('rCompetencia').value.trim();
  const actividad=document.getElementById('rActividad').value.trim();
  if(!grado||!proyecto||!estandar||!competencia||!actividad){alert('Por favor completa los campos obligatorios (*)');return;}
  const ahora=new Date();
  const claseActual=esCatedratico()?null:getClaseActual(grado,null);
  const esTardio=claseActual?claseActual.nombre!==proyecto:false;
  DATA.registros.push({
    id:'r'+Date.now(),
    docenteId:currentUser.id,
    docenteNombre:currentUser.nombre,
    grado, proyecto,
    area:document.getElementById('rArea').value,
    fecha:document.getElementById('rFecha').value,
    hora:document.getElementById('rHora').value,
    estandar, competencia, actividad,
    recursos:document.getElementById('rRecursos').value,
    observaciones:document.getElementById('rObservaciones').value,
    destacados:document.getElementById('rDestacados').value,
    dificultades:document.getElementById('rDificultades').value,
    novedades:document.getElementById('rNovedades').value,
    estado:'pendiente',
    registroTardio:esTardio,
    esCatedratico:esCatedratico(),
    creadoEn:ahora.toISOString(),
  });
  window._regGrado=null; window._regProyecto=null;
  save(); alert('✅ Registro guardado correctamente');
  navigate('mis_registros');
}

function renderHorarios(c){
  const cat=esCatedratico()?currentUser.catKey:null;
  const misGrados=isDocente()?currentUser.grados:DATA.grados;
  const gradoSel=window._horGrado||(cat?'__cat__':misGrados[0]||'FIRST');
  const dias=['lunes','martes','miercoles','jueves','viernes'];
  const diaActual=todayDia();

  c.innerHTML=`
  <div style="margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <label style="font-size:13px;font-weight:600">Ver horario:</label>
    <select onchange="window._horGrado=this.value;navigate('horarios')" style="padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px">
      ${cat?`<option value="__cat__" ${gradoSel==='__cat__'?'selected':''}>Mi horario catedrático</option>`:''}
      ${misGrados.map(g=>`<option value="${g}" ${g===gradoSel?'selected':''}>${g}</option>`).join('')}
    </select>
  </div>`;

  if(gradoSel==='__cat__'&&cat){
    const catH=HORARIOS_CAT[cat];
    c.innerHTML+=`
    <div class="alert alert-blue">📋 <b>Horario flexible</b> — Este es tu horario base. Si hay cambios, puedes registrar manualmente.</div>
    <div class="card">
      <div class="card-header"><span class="card-title">🕐 Horario — ${catH?.nombre} (Catedrático)</span></div>
      <div style="overflow-x:auto;padding:12px">
        <div class="horario-grid">
          <div class="horario-header">Hora</div>
          ${dias.map(d=>`<div class="horario-header" style="${d===diaActual?'background:#c2185b':''}">${d.charAt(0).toUpperCase()+d.slice(1)}</div>`).join('')}
          ${['06:45','07:00','07:45','08:30','09:15','09:45','10:30','11:15','12:00','14:00','14:45'].map(hora=>{
            const fin={'06:45':'07:00','07:00':'07:45','07:45':'08:30','08:30':'09:15','09:15':'09:45','09:45':'10:30','10:30':'11:15','11:15':'12:00','12:00':'14:00','14:00':'14:45','14:45':'15:00'}[hora]||'';
            return `<div class="horario-hora">${hora}<br>${fin}</div>
            ${dias.map(d=>{
              const cls=catH.clases[d]||[];
              const found=cls.find(h=>h.ini===hora);
              return `<div class="horario-celda ${found?'especial':'vacio'}">${found?`<b>${found.area||catH.nombre}</b><br>${found.grado}`:''}</div>`;
            }).join('')}`;
          }).join('')}
        </div>
      </div>
    </div>`;
  } else {
    const horario=HORARIOS[gradoSel]||[];
    c.innerHTML+=`
    <div class="card">
      <div class="card-header"><span class="card-title">🕐 Horario — ${gradoSel}</span></div>
      <div style="overflow-x:auto;padding:12px">
        <div class="horario-grid">
          <div class="horario-header">Hora</div>
          ${dias.map(d=>`<div class="horario-header" style="${d===diaActual?'background:#c2185b':''}">${d.charAt(0).toUpperCase()+d.slice(1)}</div>`).join('')}
          ${horario.map(h=>{
            const claseActual2=getClaseActual(gradoSel,null);
            return `<div class="horario-hora">${h.ini}<br>${h.fin}</div>
            ${dias.map(d=>{
              const esActual=claseActual2&&claseActual2.ini===h.ini&&d===diaActual;
              const tipoClass=h.tipo==='descanso'?'descanso':h.tipo==='lunch'?'lunch':'';
              return `<div class="horario-celda ${tipoClass} ${esActual?'actual':''}">${h.clases[d]||''}</div>`;
            }).join('')}`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }
}

      </div></td>

function saveUsuario(id){
  const n=document.getElementById('uNombre').value.trim();
  const usu=document.getElementById('uUsuario').value.trim();
  const pass=document.getElementById('uPass').value.trim();
  if(!n||!usu||!pass){alert('Completa todos los campos');return;}
  const grados=Array.from(document.querySelectorAll('#gradosChips .chip.selected')).map(el=>el.dataset.g);
  const tipo=document.getElementById('uTipo').value;
  if(id){
    const u=DATA.usuarios.find(x=>x.id===id);
    u.nombre=n;u.usuario=usu;u.pass=pass;u.rol=document.getElementById('uRol').value;u.grados=grados;u.tipo=tipo;
  } else {
    DATA.usuarios.push({id:'u'+Date.now(),nombre:n,usuario:usu,pass,rol:document.getElementById('uRol').value,grados,tipo,activo:true});
  }
  save();document.querySelector('.modal-overlay').remove();navigate('usuarios');
}

function toggleUsuario(id){const u=DATA.usuarios.find(x=>x.id===id);if(u){u.activo=!u.activo;save();navigate('usuarios');}}
function deleteUsuario(id){if(!confirm('¿Eliminar este usuario?'))return;DATA.usuarios=DATA.usuarios.filter(u=>u.id!==id);save();navigate('usuarios');}

  </div>`;

  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="repModal">
  <div class="modal" style="max-width:800px">
    <div class="modal-header">
      <span class="modal-title">📄 ${titles[tipo]}</span>
      <button class="modal-close" onclick="document.getElementById('repModal').remove()">✕</button>
    </div>
    <div id="repContenido">${contenido}</div>
    <div style="display:flex;gap:10px;margin-top:14px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="document.getElementById('repModal').remove()">Cerrar</button>
      <button class="btn btn-pink" onclick="imprimirRep()">🖨️ Imprimir / PDF</button>
    </div>
  </div></div>`);
}

function imprimirRep(){
  const contenido=document.getElementById('repContenido').innerHTML;
  const w=window.open('','_blank','width=900,height=700');
  if(w){w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Reporte FMH</title><style>*{font-family:'Segoe UI',sans-serif}body{padding:20px}</style></head><body>${contenido}</body></html>`);w.document.close();setTimeout(()=>w.print(),500);}
}
</script>
</body>
</html>
